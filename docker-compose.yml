version: '3.8'

services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    # 1. Drop root privileges immediately
    user: "1000:1000"
    # 2. Prevent port mapping exposure to the public internet
    ports:
      - "127.0.0.1:18789:18789"
    environment:
      - NODE_ENV=production
      # Forces internal gateway binding while host mapping controls access
      - OPENCLAW_GATEWAY_BIND=lan 
    volumes:
      # 3. Mount isolated persistence paths
      - ./config:/home/node/.openclaw/config:rw
      - ./workspace:/home/node/.openclaw/workspace:rw
      # Required for headless browser features if using tool skills
      - type: tmpfs
        target: /dev/shm
        tmpfs:
          size: 2000000000 # 2GB Shared Memory allocation
    # 4. Strict kernel and runtime isolation
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          memory: 1G
